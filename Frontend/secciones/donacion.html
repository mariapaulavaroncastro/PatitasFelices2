<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../styles.css">
  <link rel="icon" type="image/jpeg" href="../images/logo.jpg">
  <title>Donaciones</title>
</head>
<body>
  <header>
    <div class="logo-container">
      <img src="../images/logo.jpg" alt="Logo Patitas Felices" class="logo">
    </div>
    <h1>Donaciones</h1>

    <nav>
      <ul>
        <li><a href="../index.html">Inicio</a></li>
        <li><a href="../secciones/adopcion.html">Adopción</a></li>
        <li><a href="../secciones/voluntariado.html">Voluntariado</a></li>
        <li><a href="../secciones/noticias.html">Noticias</a></li>
      </ul>
    </nav>
  </header>

  <main>
 <div class="panel-emocional donacion-panel">
  <img src="../images/donacion.jpg" alt="Manos sosteniendo un corazón" class="panel-imagen">
  <div class="panel-texto">
    Tus aportes nos ayudan a rescatar, alimentar y dar cuidados médicos a más animales.
  </div>
</div>


    <!-- 🐾 Formulario simplificado -->
    <section class="formulario-donacion">
      <h2>Realiza tu donación</h2>
      <form action="https://link.mercadopago.com.co/patitasfelicespagos" method="get" target="_blank">
        <label>Nombre completo:</label><br>
        <input type="text" name="nombre" required><br><br>

        <label>Teléfono (formato internacional):</label><br>
        <input type="text" name="telefono" placeholder="+573001234567" required><br><br>

        <label>Monto a donar (COP):</label><br>
        <input type="number" name="monto" min="1000" required><br><br>

        <label>Mensaje adicional (opcional):</label><br>
        <textarea name="mensaje" rows="3"></textarea><br><br>

        <button type="submit">Donar con Mercado Pago 🐾</button>
      </form>

      <div style="text-align: center; margin-top: 20px; color: #555;">
        <p><small>Tu donación se procesa de forma segura.</small></p>
        <img 
          src="../images/images.png"
          alt="Medios de pago de Mercado Pago" 
          style="max-width: 300px; margin-top: 10px; border: 1px solid #eee; border-radius: 8px;">
      </div>
    </section>
  </main>

  <footer>
    <p>© 2025 Patitas Felices. Todos los derechos reservados.</p>
  </footer>
  
</body>
</html>
