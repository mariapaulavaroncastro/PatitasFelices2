<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="icon" type="image/jpeg" href="../images/logo.jpg" />
  <title>Noticias - Patitas Felices</title>
</head>
<body>
  <header>
    <div class="logo-container">
      <img src="../images/logo.jpg" alt="Logo Patitas Felices" class="logo" />
    </div>
    <h1>Noticias</h1>
    <nav>
      <ul>
        <li><a href="../index.html">Inicio</a></li>
        <li><a href="../secciones/adopcion.html">Adopción</a></li>
        <li><a href="../secciones/voluntariado.html">Voluntariado</a></li>
        <li><a href="../secciones/donacion.html">Donación</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="intro">
      <h3>Descubre cómo ayudamos a rescatar y cuidar animales en tu comunidad.</h3>
    </section>

    <section class="noticias" id="contenedorNoticias"></section>
  </main>

  <footer>
    <p>© 2025 Patitas Felices. Todos los derechos reservados.</p>
  </footer>

  <script>
    async function cargarNoticias() {
      try {
        const res = await fetch('http://142.93.53.83/api/noticias');
        const noticias = await res.json();
        const contenedor = document.getElementById('contenedorNoticias');
        contenedor.innerHTML = '';

        noticias.forEach(noticia => {
          const bloque = document.createElement('article');
          bloque.className = 'noticia';
          
          // CAMBIO CLAVE: noticia.imagen_url en lugar de noticia.imagen
          bloque.innerHTML = `
            <h4>${noticia.titulo}</h4>
            <img src="${noticia.imagen_url}" 
                 alt="${noticia.titulo}" 
                 class="imagen-noticia" 
                 onerror="this.src='../images/default.jpg'" />
            <p>${noticia.contenido}</p>
            <span class="fecha">${new Date(noticia.fecha_publicacion).toLocaleDateString()}</span>
            
            <div class="interacciones">
              <button onclick="reaccionar(${noticia.id}, this)">❤️ Me encanta (<span id="reacciones-${noticia.id}">0</span>)</button>
              <div class="comentarios">
                <textarea placeholder="Escribe un comentario..." onkeydown="comentar(event, ${noticia.id}, this)"></textarea>
                <ul id="comentarios-${noticia.id}"></ul>
              </div>
            </div>
          `;
          contenedor.appendChild(bloque);
          
          // Cargar datos adicionales usando el nuevo ID
          cargarComentarios(noticia.id);
          cargarReacciones(noticia.id);
        });
      } catch (error) {
        console.error("Error al cargar noticias:", error);
      }
    }

    async function reaccionar(id, boton) {
      await fetch(`http://142.93.53.83/api/noticias/${id}/reaccionar`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre: 'Anónimo', tipo: 'me_encanta' })
      });
      cargarReacciones(id);
      boton.disabled = true;
    }

    async function cargarReacciones(id) {
      const res = await fetch(`http://142.93.53.83/api/noticias/${id}/reacciones`);
      const datos = await res.json();
      const contador = datos.find(r => r.tipo === 'me_encanta')?.cantidad || 0;
      document.getElementById(`reacciones-${id}`).textContent = contador;
    }

    async function comentar(event, id, textarea) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        const texto = textarea.value.trim();
        if (!texto) return;
        await fetch(`http://142.93.53.83/api/noticias/${id}/comentar`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ texto })
        });
        textarea.value = '';
        cargarComentarios(id);
      }
    }

    async function cargarComentarios(id) {
      const res = await fetch(`http://142.93.53.83/api/noticias/${id}/comentarios`);
      const comentarios = await res.json();
      const lista = document.getElementById(`comentarios-${id}`);
      lista.innerHTML = '';
      comentarios.forEach(c => {
        const li = document.createElement('li');
        li.innerHTML = `<strong>${c.nombre}:</strong> ${c.contenido}`;
        lista.appendChild(li);
      });
    }

    cargarNoticias();
  </script>
</body>
</html>
