<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../styles.css" />
  <title>Gestión de Noticias - Admin</title>
</head>
<body>
  <header>
    <h1>Panel de Gestión de Noticias</h1>
  </header>

  <main class="formulario">
    <h2>Publicar nueva noticia</h2>
    <form id="formNoticia">
      <label>Título:</label>
      <input type="text" name="titulo" required />
      
      <label>Contenido:</label>
      <textarea name="contenido" rows="5" required></textarea>
      
      <label>URL de la Imagen (Link):</label>
      <input type="text" name="imagen_url" placeholder="https://ejemplo.com/foto.jpg" required />
      
      <button type="submit">Publicar Noticia 🐾</button>
    </form>

    <hr>
    <h2>Noticias publicadas</h2>
    <section id="listaNoticias"></section>

    <div id="formEditarNoticia" class="oculto" style="background: #f9f9f9; padding: 20px; border: 1px dashed #ccc; margin-top: 20px;">
      <h3>Editar noticia</h3>
      <form id="editarNoticia">
        <input type="hidden" name="id" />
        <label>Nuevo Título:</label>
        <input type="text" name="titulo" required />
        <label>Nuevo Contenido:</label>
        <textarea name="contenido" rows="5" required></textarea>
        <label>Nueva URL de Imagen:</label>
        <input type="text" name="imagen_url" required />
        <button type="submit">Actualizar Cambios</button>
        <button type="button" onclick="document.getElementById('formEditarNoticia').classList.add('oculto')">Cancelar</button>
      </form>
    </div>
  </main>

  <script>
    // Verificación de sesión
    if (!localStorage.getItem('adminId')) { window.location.href = 'login.html'; }
    const adminId = localStorage.getItem('adminId');
    let noticiasGuardadas = [];

    // --- CREAR NOTICIA ---
    document.getElementById('formNoticia').addEventListener('submit', async (e) => {
      e.preventDefault();
      const datos = Object.fromEntries(new FormData(e.target));
      
      // Ajuste: Se usa 'autor_id' para coincidir con la base de datos
      datos.autor_id = adminId;

      const res = await fetch('http://142.93.53.83/api/admin/noticias', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(datos)
      });

      if(res.ok) {
        alert(" Noticia publicada");
        e.target.reset();
        cargarNoticias();
      } else {
        alert(" Error al publicar. Revisa la consola.");
      }
    });

    // --- LISTAR NOTICIAS ---
    async function cargarNoticias() {
      try {
        const res = await fetch('http://142.93.53.83/api/noticias');
        noticiasGuardadas = await res.json();
        const contenedor = document.getElementById('listaNoticias');
        contenedor.innerHTML = '';

        noticiasGuardadas.forEach(n => {
          const bloque = document.createElement('article');
          bloque.style.border = "1px solid #eee";
          bloque.style.padding = "10px";
          bloque.style.marginBottom = "10px";
          
          // Ajuste: n.id y n.imagen_url (nombres reales de tu tabla)
          bloque.innerHTML = `
            <h4>${n.titulo}</h4>
            <img src="${n.imagen_url}" style="max-width:150px; border-radius:4px;" onerror="this.src='../images/default.jpg'">
            <br><br>
            <button onclick="mostrarFormularioEdicion(${n.id})" style="background:#ffcc00; cursor:pointer;">Editar</button>
            <button onclick="eliminarNoticia(${n.id})" style="background:#ff4444; color:white; cursor:pointer;">Eliminar</button>
          `;
          contenedor.appendChild(bloque);
        });
      } catch (error) {
        console.error("Error al cargar lista:", error);
      }
    }

    // --- ELIMINAR ---
    async function eliminarNoticia(id) {
      if(!confirm("¿Seguro que deseas eliminar esta noticia?")) return;
      
      const res = await fetch(`http://142.93.53.83/api/admin/noticias/${id}`, { method: 'DELETE' });
      
      if(res.ok) {
        alert(" Noticia eliminada");
        cargarNoticias();
      }
    }

    // --- MOSTRAR EDICIÓN ---
    function mostrarFormularioEdicion(id) {
      // Ajuste: Buscar por 'id'
      const n = noticiasGuardadas.find(item => item.id === id);
      const form = document.getElementById('editarNoticia');
      
      form.id.value = n.id;
      form.titulo.value = n.titulo;
      form.contenido.value = n.contenido;
      form.imagen_url.value = n.imagen_url;
      
      document.getElementById('formEditarNoticia').classList.remove('oculto');
      window.scrollTo({ top: document.getElementById('formEditarNoticia').offsetTop, behavior: 'smooth' });
    }

    // --- ACTUALIZAR ---
    document.getElementById('editarNoticia').addEventListener('submit', async (e) => {
      e.preventDefault();
      const datos = Object.fromEntries(new FormData(e.target));
      const id = datos.id; // Nombre corregido

      const res = await fetch(`http://142.93.53.83/api/admin/noticias/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(datos)
      });

      if(res.ok) {
        alert("✨ Noticia actualizada");
        document.getElementById('formEditarNoticia').classList.add('oculto');
        cargarNoticias();
      }
    });

    cargarNoticias();
  </script>
</body>
</html>
